    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .no-select { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        
        /* Animazioni Eventi Meteo */
        @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 50% { box-shadow: 0 0 20px 10px rgba(239, 68, 68, 0); } }
        .event-active { animation: pulse-red 2s infinite; }

        /* Animazione Domino Eliminazione */
        @keyframes domino-explode {
            0% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; filter: brightness(1); }
            30% { transform: scale(1.2) translateY(-10px) rotate(10deg); opacity: 0.9; filter: brightness(1.5); z-index: 50; }
            100% { transform: scale(0) translateY(20px) rotate(-15deg); opacity: 0; filter: brightness(0); }
        }
        .explode-anim {
            animation: domino-explode 0.8s ease-in forwards;
        }
    </style>

          { id: 'zb6', cat: 'Zatch Bell', n: 'Wonrei', i: 'https://i.pinimg.com/1200x/0c/d5/41/0cd541a112da6d9ca75de060e3b5bf9a.jpg' }
        ];

        const ITEMS = [
          { id: 'turbo', n: 'Turbo', icon: '🚀', desc: '+2 al prossimo lancio.' },
          { id: 'curse', n: 'Maledizione', icon: '💀', desc: '-2 al prossimo lancio di un nemico.' },
          { id: 'jackpot', n: 'Jackpot', icon: '🎰', desc: 'Lancia il dado di nuovo a fine turno.' },
          { id: 'terremoto', n: 'Terremoto', icon: '🌋', desc: 'Distruggi 2 caselle di un avversario.' },
          { id: 'conquista', n: 'Conquista', icon: '🏳️', desc: 'Ottieni 2 caselle libere a caso.' },
          { id: 'stregoneria', n: 'Stregoneria', icon: '🔮', desc: 'Il prossimo lancio del bersaglio gli toglierà caselle e salterà il turno.' }
        ];

        const EVENT_TYPES = [
            { id: 'tempesta', n: 'Tempesta Caotica', i: '🌪️', desc: 'In questo round ti espandi partendo dai territori del giocatore successivo!' },
            { id: 'robin_hood', n: 'Legge di Robin Hood', i: '🏹', desc: 'Il primo in classifica ha perso 3 caselle, l\'ultimo ne ha ricevute 3 in dono!' },
            { id: 'festa', n: 'Giorno di Festa', i: '🎉', desc: 'Tutti i giocatori ottengono +2 mosse gratis per questo round!' },
            { id: 'carestia', n: 'Carestia', i: '☠️', desc: 'Gli inventari sono bloccati. Nessuno può usare oggetti in questo round!' },
            { id: 'cataclisma', n: 'Cataclisma', i: '🌋', desc: 'Un tremendo terremoto ha distrutto il 15% di tutte le caselle occupate sulla mappa!' },
            { id: 'glaciale', n: 'Era Glaciale', i: '🧊', desc: 'Il pavimento è scivoloso! Ogni conquista ti regala automaticamente una casella adiacente extra.' },
            { id: 'meteoriti', n: 'Pioggia di Meteoriti', i: '☄️', desc: 'Sono precipitate delle meteore che hanno creato muri indistruttibili sulla mappa!' }
        ];

        // --- FUNZIONI DI UTILITÀ ---
        const getCollectionRef = () => collection(db, 'artifacts', appId, 'public', 'data', 'rooms');

        const generateBoard = (size, shape, spawnRate = 0.08) => {
          const board = {};
          const center = (size - 1) / 2;
          for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
              let valid = false;
              if (shape === 'square') valid = true;
              if (shape === 'circle') {
                const dist = Math.sqrt(Math.pow(x - center, 2) + Math.pow(y - center, 2));
                valid = dist <= size / 2;
              }
              if (shape === 'diamond') {
                const dist = Math.abs(x - center) + Math.abs(y - center);
                valid = dist <= size / 2 + 0.5;
              }
              if (valid) board[`${x},${y}`] = { owner: null, item: Math.random() < spawnRate ? ITEMS[Math.floor(Math.random() * ITEMS.length)].id : null, isWall: false };
            }
          }
          return board;
        };

        const getSpawnPoints = (size, numPlayers, board) => {
          const max = size - 1;
          const mid = Math.floor(max/2);
          const q1 = Math.floor(max/4);
          const q3 = Math.floor(max*3/4);
          const idealSpawns = [
            [0, 0], [max, max], [max, 0], [0, max],
            [mid, 0], [mid, max], [0, mid], [max, mid],
            [q1, 0], [q3, 0], [0, q1], [0, q3],
            [max, q1], [max, q3], [q1, max], [q3, max]
          ];
          
          const actualSpawns = [];
          for (let ideal of idealSpawns) {
            let nearest = null;
            let minDist = Infinity;
            Object.keys(board).forEach(key => {
              const [x, y] = key.split(',').map(Number);
              const dist = Math.abs(x - ideal[0]) + Math.abs(y - ideal[1]);
              if (dist < minDist && !actualSpawns.includes(`${x},${y}`)) {
                minDist = dist; nearest = `${x},${y}`;
              }
            });
            if (nearest) actualSpawns.push(nearest);
            if (actualSpawns.length >= numPlayers) break;
          }
          return actualSpawns;
        };

        const buildTournamentTree = (totalPlayers) => {
            const phases = [];
            let currentSize = totalPlayers;
            
            while (currentSize > 4) {
                let matchSize = currentSize >= 32 ? 8 : 4;
                let numMatches = currentSize / matchSize;
                
                const matches = [];
                for (let i = 0; i < numMatches; i++) {
                    matches.push({ players: [], completed: false, winners: [] });
                }
                
                phases.push({ name: `Top ${currentSize}`, matches, matchSize });
                
                currentSize = numMatches * (matchSize / 2); 
            }
            
            phases.push({ name: "Top 4", matches: [{ players: [], completed: false, winners: [] }], matchSize: 4 });
            phases.push({ name: "Finalissima", matches: [{ players: [], completed: false, winners: [] }], matchSize: 2 });
            return phases;
        };

        const handleTournamentMatchEnd = async (room, winners) => {
            const { phases, currentPhase, currentMatch } = room.tournament;
            const newPhases = [...phases];
            newPhases[currentPhase].matches[currentMatch].winners = winners;
            newPhases[currentPhase].matches[currentMatch].completed = true;

            let nextPhaseIdx = currentPhase; let nextMatchIdx = currentMatch + 1;

            if (nextMatchIdx >= newPhases[currentPhase].matches.length) {
                nextPhaseIdx++; nextMatchIdx = 0;
                if (nextPhaseIdx < newPhases.length) {
                    const prevMatchesCount = newPhases[currentPhase].matches.length;
                    const nextMatchesCount = newPhases[nextPhaseIdx].matches.length;
                    for (let i = 0; i < prevMatchesCount; i++) {
                         let nextPhaseMatchIdx;
                         if (prevMatchesCount === nextMatchesCount) nextPhaseMatchIdx = i;
                         else nextPhaseMatchIdx = Math.floor(i / 2); 
                         newPhases[nextPhaseIdx].matches[nextPhaseMatchIdx].players.push(...newPhases[currentPhase].matches[i].winners);
                    }
                }
            }

            await updateDoc(doc(getCollectionRef(), room.id), {
                status: 'tournament_bracket', 'tournament.phases': newPhases, 'tournament.currentPhase': nextPhaseIdx, 'tournament.currentMatch': nextMatchIdx
            });
        };

        // --- COMPONENTE CHAT ---
        function ChatBox({ room, user }) {
            const [isOpen, setIsOpen] = useState(false);
            const [text, setText] = useState('');
            const [unread, setUnread] = useState(0);
            const messagesEndRef = useRef(null);
            
            const messages = room.messages || [];
            const prevMsgCount = useRef(messages.length);

            useEffect(() => {
                const currentCount = messages.length;
                if (currentCount > prevMsgCount.current) {
                    const isMyMessage = messages[currentCount - 1]?.uid === user.uid;
                    if (!isOpen && !isMyMessage) {
                        setUnread(prev => prev + (currentCount - prevMsgCount.current));
                        playChatSound();
                    } else if (isOpen && !isMyMessage) {
                        playChatSound();
                    }
                }
                prevMsgCount.current = currentCount;
                
                if (isOpen) {
                    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
                }
            }, [messages, isOpen, user.uid]);

            const toggleChat = () => {
                setIsOpen(!isOpen);
                if (!isOpen) setUnread(0);
            };

            const sendMsg = async (e) => {
                e.preventDefault();
                if (!text.trim()) return;
                
                const me = room.players[user.uid];
                const senderName = me ? me.n : (localStorage.getItem('tw_player_name') || "Spettatore");
                const senderColor = me ? me.color : "#94a3b8";

                const newMsg = {
                    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 5),
                    uid: user.uid,
                    n: senderName,
                    color: senderColor,
                    text: text.trim(),
                    t: Date.now()
                };

                setText('');
                await updateDoc(doc(getCollectionRef(), room.id), {
                    messages: arrayUnion(newMsg)
                });
            };

            return (
                <div className="fixed bottom-4 left-4 z-[100] flex flex-col items-start pointer-events-none">
                    {isOpen && (
                        <div className="bg-slate-800 border border-slate-600 rounded-xl shadow-2xl w-72 sm:w-80 h-[50vh] max-h-96 flex flex-col mb-2 overflow-hidden pointer-events-auto">
                            <div className="bg-slate-700 px-4 py-3 font-bold flex justify-between items-center border-b border-slate-600 shrink-0">
                                <span>💬 Chat Globale</span>
                                <button onClick={toggleChat} className="text-slate-400 hover:text-white text-xl leading-none">&times;</button>
                            </div>
                            <div className="flex-1 p-3 overflow-y-auto space-y-3 custom-scrollbar text-sm bg-slate-800/80">
                                {messages.length === 0 && <div className="text-center text-slate-500 italic mt-10">Nessun messaggio.</div>}
                                {messages.map(m => (
                                    <div key={m.id} className={`flex flex-col ${m.uid === user.uid ? 'items-end' : 'items-start'}`}>
                                        <span className="text-[10px] font-bold mb-0.5" style={{color: m.color}}>{m.n}</span>
                                        <div className={`px-3 py-2 rounded-xl max-w-[85%] break-words shadow-sm ${m.uid === user.uid ? 'bg-indigo-600 text-white rounded-br-none' : 'bg-slate-700 text-slate-200 rounded-bl-none'}`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                <div ref={messagesEndRef} />
                            </div>
                            <form onSubmit={sendMsg} className="p-2 bg-slate-700 border-t border-slate-600 flex gap-2 shrink-0">
                                <input type="text" value={text} onChange={e => setText(e.target.value)} placeholder="Scrivi..." className="flex-1 bg-slate-900 text-white px-3 py-2 rounded-lg outline-none text-sm border border-slate-600 focus:border-indigo-500" maxLength={120} />
                                <button type="submit" className="bg-indigo-600 hover:bg-indigo-500 px-4 rounded-lg font-bold text-sm transition-colors">Invia</button>
                            </form>
                        </div>
                    )}
                    {!isOpen && (
                        <button onClick={toggleChat} className="bg-indigo-600 hover:bg-indigo-500 text-white p-4 rounded-full shadow-[0_0_15px_rgba(0,0,0,0.5)] relative flex items-center justify-center transition-transform hover:scale-110 border-2 border-slate-800 pointer-events-auto">
                            <span className="text-2xl leading-none">💬</span>
                            {unread > 0 && (
                                <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[11px] font-black w-6 h-6 flex items-center justify-center rounded-full border-2 border-slate-800 animate-bounce">
                                    {unread > 9 ? '9+' : unread}
                                </span>
                            )}
                        </button>
                    )}
                </div>
            );
        }

        // --- COMPONENTE PRINCIPALE ---
        function App() {
          const [user, setUser] = useState(null);
          const [playerName, setPlayerName] = useState(() => localStorage.getItem('tw_player_name') || '');
          const [roomId, setRoomId] = useState(() => localStorage.getItem('tw_room_id') || '');
          const [room, setRoom] = useState(null);
          const [joining, setJoining] = useState(false);
          const [error, setError] = useState('');
          const [notification, setNotification] = useState(null);
          const [globalNotice, setGlobalNotice] = useState(null);

          const showNotif = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 3000); };
          const showGlobalNotif = (msg) => { setGlobalNotice(msg); setTimeout(() => setGlobalNotice(null), 5000); };

          useEffect(() => {
              if(room?.globalAction && room.globalAction.id !== window.lastGlobalActionId) {
                  window.lastGlobalActionId = room.globalAction.id;
                  showGlobalNotif(room.globalAction.msg);
                  if (room.globalAction.msg.includes('🚨 METEO:') || room.globalAction.msg.includes('☠️ ELIMINAZIONE')) playEventSound();
                  else playActionSound();
              }
          }, [room?.globalAction]);

          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
              } catch (e) { try { await signInAnonymously(auth); } catch(err) {} }
            };
            initAuth();
            const unsub = onAuthStateChanged(auth, setUser);
            return () => unsub();
          }, []);

          useEffect(() => {
            if (!user || !roomId) return;
            const roomRef = doc(getCollectionRef(), roomId);
            const unsub = onSnapshot(roomRef, (docSnap) => {
              if (docSnap.exists()) setRoom({ id: docSnap.id, ...docSnap.data() });
              else { 
                  setError("Stanza non trovata o scaduta!"); 
                  setRoom(null); 
                  setRoomId('');
                  localStorage.removeItem('tw_room_id');
              }
            }, (err) => { setError("Errore connessione."); });
            return () => unsub();
          }, [user, roomId]);

          const createRoom = async () => {
            initAudio();
            if (!user) return;
            if (!playerName.trim()) return setError("Inserisci il tuo nome prima di creare la stanza!");
            const newRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            const hostColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            const roomData = {
              status: 'lobby', hostId: user.uid,
              config: { mode: 'standard', players: 4, tournamentSize: 8, size: 10, shape: 'square', maxRounds: 20, invasionMode: false, botSpeed: 1, eventsEnabled: false },
              players: { [user.uid]: { id: user.uid, n: playerName.trim(), isBot: false, color: hostColor, charId: null, ready: false, hasStregoneria: false, isEliminated: false } },
              playerOrder: [user.uid], round: 1, turnIndex: 0, currentEvent: null, messages: []
            };
            await setDoc(doc(getCollectionRef(), newRoomId), roomData);
            localStorage.setItem('tw_room_id', newRoomId);
            setRoomId(newRoomId);
          };

          const joinRoom = async (e) => {
            e.preventDefault(); initAudio();
            const code = e.target.elements.code.value.toUpperCase();
            if (!user || !code) return;
            if (!playerName.trim()) return setError("Inserisci il tuo nome prima di unirti!");
            setJoining(true);
            try {
              const roomRef = doc(getCollectionRef(), code);
              const snap = await getDoc(roomRef);
              if (snap.exists()) {
                const data = snap.data();
                if (data.status !== 'lobby') setError("Partita già iniziata!");
                else if ((data.config.mode === 'standard' || data.config.mode === 'elimination') && data.playerOrder.length >= data.config.players) setError("Stanza piena!");
                else if (data.config.mode === 'tournament' && data.playerOrder.length >= data.config.tournamentSize) setError("Torneo pieno!");
                else if (!data.players[user.uid]) {
                  const newColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                  await updateDoc(roomRef, {
                    [`players.${user.uid}`]: { id: user.uid, n: playerName.trim(), isBot: false, color: newColor, charId: null, ready: false, hasStregoneria: false, isEliminated: false },
                    playerOrder: [...data.playerOrder, user.uid]
                  });
                  localStorage.setItem('tw_room_id', code);
                  setRoomId(code); setError("");
                } else {
                    localStorage.setItem('tw_room_id', code);
                    setRoomId(code);
                }
              } else setError("Stanza inesistente!");
            } catch (e) { setError("Errore durante l'accesso."); }
            setJoining(false);
          };

          const leaveRoom = () => { 
              localStorage.removeItem('tw_room_id');
              setRoomId(''); 
              setRoom(null); 
          };

          if (!user) return <div className="min-h-[100dvh] bg-gray-900 flex items-center justify-center text-white">Caricamento...</div>;

          return (
            <div className="min-h-[100dvh] bg-slate-900 text-slate-100 font-sans selection:bg-indigo-500 selection:text-white">
              {notification && ( <div className="fixed top-4 left-1/2 transform -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-full shadow-2xl z-50 animate-bounce">{notification}</div> )}
              {globalNotice && ( <div className="fixed top-1/4 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-red-600/90 backdrop-blur-sm text-white px-10 py-5 rounded-2xl shadow-[0_0_40px_rgba(220,38,38,0.6)] z-[60] text-xl font-black text-center border-2 border-red-400 animate-bounce">🚨 {globalNotice} 🚨</div> )}

              {!room ? (
                <div className="flex flex-col items-center justify-center min-h-[100dvh] p-4">
                  <div className="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-700">
                    <h1 className="text-4xl font-black text-center mb-8 bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">TERRITORY WAR</h1>
                    <div className="mb-6">
                        <label className="block text-sm text-slate-400 mb-1 font-bold">Il tuo Nome nel Gioco</label>
                        <input type="text" value={playerName} onChange={(e) => { setPlayerName(e.target.value); localStorage.setItem('tw_player_name', e.target.value); }} placeholder="Es. Marco, Giocatore1..." className="w-full bg-slate-900 border-2 border-slate-600 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 text-center font-bold text-lg" maxLength={15} />
                    </div>
                    <button onClick={createRoom} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl mb-6 transition-all transform hover:scale-105 shadow-lg shadow-indigo-500/30">Crea Nuova Stanza</button>
                    <div className="flex items-center mb-6"><div className="flex-grow border-t border-slate-600"></div><span className="px-4 text-slate-400 text-sm">OPPURE</span><div className="flex-grow border-t border-slate-600"></div></div>
                    <form onSubmit={joinRoom} className="flex gap-2">
                      <input name="code" type="text" placeholder="Codice Stanza" className="flex-grow bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 uppercase font-mono text-center" maxLength={6} required />
                      <button type="submit" disabled={joining} className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-6 rounded-xl transition-all disabled:opacity-50">{joining ? '...' : 'Entra'}</button>
                    </form>
                    {error && <p className="text-red-400 mt-4 text-center font-bold">{error}</p>}
                  </div>
                </div>
              ) : room.status === 'lobby' ? ( <Lobby room={room} user={user} onLeave={leaveRoom} showNotif={showNotif} />
              ) : room.status === 'tournament_bracket' ? ( <TournamentBracket room={room} user={user} showNotif={showNotif} />
              ) : ( <Game room={room} user={user} showNotif={showNotif} /> )}
            </div>
          );
        }

        // --- LOBBY ---
        function Lobby({ room, user, onLeave, showNotif }) {
          const isHost = room.hostId === user.uid;
          const me = room.players[user.uid];
          const [filter, setFilter] = useState('All');

          const categories = ['All', 'Alfabetico', ...new Set(CHARACTERS.map(c => c.cat))];
          let displayedChars = [...CHARACTERS];
          if (filter === 'Alfabetico') displayedChars.sort((a, b) => a.n.localeCompare(b.n));
          else if (filter !== 'All') displayedChars = displayedChars.filter(c => c.cat === filter);

          const updateConfig = async (key, val) => { if (!isHost) return; await updateDoc(doc(getCollectionRef(), room.id), { [`config.${key}`]: val }); };

          const selectChar = async (charId) => {
            if (Object.values(room.players).some(p => p.charId === charId)) return showNotif("Personaggio già preso!");
            await updateDoc(doc(getCollectionRef(), room.id), { [`players.${user.uid}.charId`]: charId });
          };

          const toggleReady = async () => {
            if (!me?.charId) return showNotif("Scegli un personaggio prima!");
            await updateDoc(doc(getCollectionRef(), room.id), { [`players.${user.uid}.ready`]: !me.ready });
          };

          const addBot = async () => {
            const maxAllowed = room.config.mode === 'tournament' ? room.config.tournamentSize : room.config.players;
            if (!isHost || room.playerOrder.length >= maxAllowed) return;
            const botId = `bot_${Math.random().toString(36).substring(2, 7)}`;
            const color = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            const pickedChars = Object.values(room.players).map(p => p.charId).filter(Boolean);
            const available = CHARACTERS.filter(c => !pickedChars.includes(c.id));
            const char = available[Math.floor(Math.random() * available.length)];

            await updateDoc(doc(getCollectionRef(), room.id), {
              [`players.${botId}`]: { id: botId, n: `[BOT] ${char.n}`, isBot: true, color, charId: char.id, ready: true, hasStregoneria: false, isEliminated: false },
              playerOrder: [...room.playerOrder, botId]
            });
          };

          const generateTournamentBot = (existingPlayersObj, existingOrder) => {
              const botId = `bot_${Math.random().toString(36).substring(2, 7)}`;
              const color = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
              const pickedChars = Object.values(existingPlayersObj).map(p => p.charId).filter(Boolean);
              const available = CHARACTERS.filter(c => !pickedChars.includes(c.id));
              const char = available[Math.floor(Math.random() * available.length)];
              return { id: botId, data: { id: botId, n: `[BOT] ${char.n}`, isBot: true, color, charId: char.id, ready: true, hasStregoneria: false, isEliminated: false } };
          };

          const startGame = async () => {
            if (!isHost) return;
            if (!Object.values(room.players).every(p => p?.ready)) return showNotif("Tutti devono essere pronti!");

            initAudio();

            if (room.config.mode === 'tournament') {
                let finalPlayersObj = { ...room.players };
                let finalPlayerOrder = [ ...room.playerOrder ];
                
                while (finalPlayerOrder.length < room.config.tournamentSize) {
                    const bot = generateTournamentBot(finalPlayersObj, finalPlayerOrder);
                    finalPlayersObj[bot.id] = bot.data; finalPlayerOrder.push(bot.id);
                }

                const shuffledOrder = [...finalPlayerOrder].sort(() => Math.random() - 0.5);
                const tournamentPhases = buildTournamentTree(room.config.tournamentSize);
                
                let playerIdx = 0;
                tournamentPhases[0].matches.forEach(match => {
                    for(let i=0; i < tournamentPhases[0].matchSize; i++) {
                        if (shuffledOrder[playerIdx]) { match.players.push(shuffledOrder[playerIdx]); playerIdx++; }
                    }
                });

                await updateDoc(doc(getCollectionRef(), room.id), {
                    status: 'tournament_bracket', players: finalPlayersObj, playerOrder: finalPlayerOrder,
                    tournament: { phases: tournamentPhases, currentPhase: 0, currentMatch: 0 }
                });

            } else {
                const spawnRate = room.config.mode === 'elimination' ? 0.15 : 0.08;
                const board = generateBoard(room.config.size, room.config.shape, spawnRate);
                const spawns = getSpawnPoints(room.config.size, room.playerOrder.length, board);
                
                const updates = { 
                    status: 'playing', turnIndex: 0, round: 1, actionState: 'rolling', movesLeft: 0, currentRoll: 0, currentEvent: null,
                    eliminationRank: [],
                    lastAction: { msg: `🎮 La partita inizia! Tocca a ${room.players[room.playerOrder[0]]?.n}!`, id: Date.now() }
                };
                room.playerOrder.forEach((pid, idx) => {
                  updates[`players.${pid}.tiles`] = 1; updates[`players.${pid}.inventory`] = [];
                  updates[`players.${pid}.modifier`] = 0; updates[`players.${pid}.isTrapped`] = false; updates[`players.${pid}.hasStregoneria`] = false;
                  updates[`players.${pid}.isEliminated`] = false;
                  if (spawns[idx]) { board[`${spawns[idx]}`] = { owner: pid, item: null, isSpawn: true, isWall: false }; }
                });
                updates.board = board; 
                await updateDoc(doc(getCollectionRef(), room.id), updates);
            }
          };

          const maxDisplayPlayers = room.config.mode === 'tournament' ? room.config.tournamentSize : room.config.players;

          return (
            <div className="max-w-6xl mx-auto p-4 flex flex-col md:flex-row gap-6 h-[100dvh]">
              <div className="w-full md:w-1/3 flex flex-col gap-4 overflow-y-auto pr-2 custom-scrollbar relative">
                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shrink-0">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-xl font-bold text-white">Stanza: <span className="text-indigo-400 select-all">{room.id}</span></h2>
                    <button onClick={onLeave} className="text-red-400 hover:text-red-300 text-sm">Esci</button>
                  </div>
                  
                  {isHost ? (
                    <div className="space-y-4">
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Modalità Gioco</label>
                        <div className="flex gap-2 text-xs sm:text-sm">
                            <button onClick={() => updateConfig('mode', 'standard')} className={`flex-1 py-2 rounded ${room.config.mode==='standard' ? 'bg-indigo-500 text-white font-bold' : 'bg-slate-700 text-slate-300'}`}>Standard</button>
                            <button onClick={() => updateConfig('mode', 'elimination')} className={`flex-1 py-2 rounded ${room.config.mode==='elimination' ? 'bg-red-600 text-white font-bold shadow-[0_0_10px_red]' : 'bg-slate-700 text-slate-300'}`}>Eliminazione</button>
                            <button onClick={() => updateConfig('mode', 'tournament')} className={`flex-1 py-2 rounded ${room.config.mode==='tournament' ? 'bg-orange-500 text-white font-bold' : 'bg-slate-700 text-slate-300'}`}>Torneo</button>
                        </div>
                        {room.config.mode === 'elimination' && <div className="text-xs text-red-400 mt-1 animate-pulse">Ogni 3 round l'ultimo muore!</div>}
                      </div>

                      {room.config.mode === 'standard' || room.config.mode === 'elimination' ? (
                          <div>
                            <label className="block text-sm text-slate-400 mb-1">Giocatori Max (4-16)</label>
                            <input type="range" min="4" max="16" value={room.config.players} onChange={(e) => updateConfig('players', parseInt(e.target.value))} className="w-full accent-indigo-500" />
                            <div className="text-center font-bold">{room.config.players}</div>
                          </div>
                      ) : (
                          <div>
                            <label className="block text-sm text-slate-400 mb-1">Partecipanti Torneo</label>
                            <select value={room.config.tournamentSize} onChange={(e) => updateConfig('tournamentSize', parseInt(e.target.value))} className="w-full bg-slate-700 rounded p-2 text-white font-bold">
                              <option value="8">8 Giocatori</option><option value="16">16 Giocatori</option><option value="32">32 Giocatori</option><option value="64">64 Giocatori</option>
                            </select>
                          </div>
                      )}

                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Regole di Combattimento</label>
                        <div className="flex gap-2">
                            <button onClick={() => updateConfig('invasionMode', false)} className={`flex-1 py-2 rounded ${!room.config.invasionMode ? 'bg-indigo-500 text-white font-bold' : 'bg-slate-700 text-slate-300'}`}>Pacifica</button>
                            <button onClick={() => updateConfig('invasionMode', true)} className={`flex-1 py-2 rounded ${room.config.invasionMode ? 'bg-red-500 text-white font-bold' : 'bg-slate-700 text-slate-300'}`}>Guerra</button>
                        </div>
                      </div>

                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Eventi Speciali Meteo 🌪️</label>
                        <div className="flex gap-2">
                            <button onClick={() => updateConfig('eventsEnabled', false)} className={`flex-1 py-2 rounded ${!room.config.eventsEnabled ? 'bg-indigo-500 text-white font-bold' : 'bg-slate-700 text-slate-300'}`}>Classica</button>
                            <button onClick={() => updateConfig('eventsEnabled', true)} className={`flex-1 py-2 rounded ${room.config.eventsEnabled ? 'bg-purple-600 text-white font-bold shadow-[0_0_15px_purple]' : 'bg-slate-700 text-slate-300'}`}>Caos Meteo!</button>
                        </div>
                      </div>

                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Mappa</label>
                        <select value={room.config.shape} onChange={(e) => updateConfig('shape', e.target.value)} className="w-full bg-slate-700 rounded p-2 text-white">
                          <option value="square">Quadrato</option><option value="circle">Cerchio</option><option value="diamond">Rombo</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Grandezza Arena ({room.config.size}x{room.config.size})</label>
                        <input type="range" min="5" max="24" value={room.config.size} onChange={(e) => updateConfig('size', parseInt(e.target.value))} className="w-full accent-indigo-500" />
                      </div>
                      <div>
                        <label className="block text-sm text-slate-400 mb-1">Rounds ({room.config.maxRounds})</label>
                        <input type="range" min="5" max="50" value={room.config.maxRounds} onChange={(e) => updateConfig('maxRounds', parseInt(e.target.value))} className="w-full accent-indigo-500" />
                      </div>
                      
                      {(room.config.mode === 'standard' || room.config.mode === 'elimination') && (
                          <button onClick={addBot} disabled={room.playerOrder.length >= room.config.players} className="w-full bg-slate-700 hover:bg-slate-600 py-2 rounded text-sm disabled:opacity-50">+ Aggiungi Bot NPC</button>
                      )}
                    </div>
                  ) : (
                     <div className="text-slate-400 text-sm italic">In attesa dell'host per le impostazioni...</div>
                  )}
                </div>

                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 flex-1 flex flex-col min-h-0">
                  <h3 className="font-bold mb-4 shrink-0">Giocatori in Lobby ({room.playerOrder.length}/{maxDisplayPlayers})</h3>
                  <div className="space-y-3 flex-1 overflow-y-auto pr-2 custom-scrollbar">
                    {room.playerOrder.map(pid => {
                      const p = room.players[pid]; if(!p) return null; const c = CHARACTERS.find(x => x.id === p.charId);
                      return (
                        <div key={pid} className="flex items-center p-3 rounded-xl bg-slate-700/50 border-l-4 shrink-0" style={{borderColor: p.color}}>
                          {c ? <img src={c.i} alt="" className="w-10 h-10 rounded-full object-cover mr-3 border-2 border-slate-600" /> : <div className="w-10 h-10 rounded-full bg-slate-600 mr-3 flex items-center justify-center text-xs">?</div>}
                          <div className="flex-grow min-w-0">
                            <div className="font-bold text-sm truncate">{p.n}</div>
                            <div className="text-xs text-slate-400">{p.ready ? '🟢 Pronto' : '🟡 In scelta...'}</div>
                          </div>
                          {isHost && p.isBot && <button onClick={() => updateDoc(doc(getCollectionRef(), room.id), { [`players.${pid}`]: null, playerOrder: room.playerOrder.filter(x => x !== pid) })} className="text-red-400 ml-2 font-black">X</button>}
                        </div>
                      );
                    })}
                  </div>
                  
                  <div className="mt-6 border-t border-slate-700 pt-4 shrink-0">
                    <h3 className="font-bold mb-3 text-sm text-slate-300">Scegli il tuo Colore</h3>
                    <div className="flex items-center gap-4">
                      <input type="color" value={me?.color || '#ffffff'} onChange={(e) => updateDoc(doc(getCollectionRef(), room.id), { [`players.${user.uid}.color`]: e.target.value })} className="w-16 h-16 rounded-xl cursor-pointer bg-slate-900 border-2 border-slate-600 p-1 shrink-0" />
                      <span className="text-sm text-slate-400 leading-snug">Clicca sul quadrato per aprire la tavolozza e creare la tinta della tua fazione.</span>
                    </div>
                  </div>
                </div>

                <div className="flex flex-col gap-2 shrink-0 mt-auto sticky bottom-0 bg-slate-900/95 backdrop-blur py-4 z-50 border-t border-slate-800 shadow-[0_-10px_20px_rgba(15,23,42,0.9)] w-full">
                  <button onClick={toggleReady} className={`w-full py-4 rounded-xl font-black text-lg shadow-lg text-white ${me?.ready ? 'bg-red-600 hover:bg-red-500' : 'bg-emerald-600 hover:bg-emerald-500'}`}>
                    {me?.ready ? 'Annulla Pronto' : 'SONO PRONTO'}
                  </button>
                  {isHost && (
                    <button onClick={startGame} className={`w-full py-4 rounded-xl font-black text-lg shadow-lg ${Object.values(room.players).every(p => p?.ready) ? 'bg-indigo-600 hover:bg-indigo-500 text-white' : 'bg-slate-700 text-slate-500 cursor-not-allowed'}`}>
                      {room.config.mode === 'tournament' ? 'AVVIA TORNEO' : 'INIZIA PARTITA'}
                    </button>
                  )}
                </div>
              </div>

              <div className="w-full md:w-2/3 bg-slate-800 rounded-2xl border border-slate-700 p-6 flex flex-col h-full overflow-hidden">
                <h2 className="text-2xl font-black mb-4 shrink-0">Scegli il tuo personaggio</h2>
                <div className="flex gap-2 overflow-x-auto pb-4 mb-4 shrink-0 custom-scrollbar">
                  {categories.map(cat => (
                    <button key={cat} onClick={() => setFilter(cat)} className={`px-4 py-1.5 rounded-full text-sm whitespace-nowrap transition-colors ${filter === cat ? 'bg-indigo-500 text-white font-bold' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>{cat}</button>
                  ))}
                </div>

                <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-4 overflow-y-auto pr-2 pb-10 flex-1 content-start custom-scrollbar">
                  {displayedChars.map(c => {
                     const takenByPlayer = Object.values(room.players).find(p => p?.charId === c.id);
                     const isTaken = !!takenByPlayer;
                     const isMe = me?.charId === c.id;
                     return (
                      <div key={c.id} onClick={() => !isTaken && selectChar(c.id)} className={`relative flex flex-col items-center cursor-pointer transition-transform transform hover:scale-105 ${isTaken && !isMe ? 'opacity-40 cursor-not-allowed' : ''}`}>
                        <div className={`w-20 h-20 rounded-xl overflow-hidden border-4 ${isMe ? 'border-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)]' : 'border-slate-600'}`} style={isTaken && !isMe ? {borderColor: takenByPlayer.color} : {}}>
                          <img src={c.i} alt={c.n} className={`w-full h-full object-cover ${isTaken && !isMe ? 'grayscale' : ''}`} />
                        </div>
                        <span className="text-xs font-bold mt-2 text-center truncate w-full">{c.n}</span>
                        {isTaken && !isMe && ( <div className="absolute top-8 text-[10px] bg-slate-900 border px-2 py-0.5 rounded shadow truncate max-w-[90%] font-bold" style={{borderColor: takenByPlayer.color, color: takenByPlayer.color}}>{takenByPlayer.n}</div> )}
                      </div>
                     )
                  })}
                </div>
              </div>
              
              <ChatBox room={room} user={user} />
            </div>
          );
        }

        // --- TOURNAMENT BRACKET VIEW ---
        function TournamentBracket({ room, user, showNotif }) {
            const isHost = room.hostId === user.uid;
            const { phases, currentPhase, currentMatch } = room.tournament;
            
            if (currentPhase >= phases.length) {
                const finalPhase = phases[phases.length - 1];
                const winnerId = finalPhase.matches[0].winners[0];
                const winner = room.players[winnerId];

                if (!winner) return <div className="min-h-[100dvh] bg-slate-950 text-white flex items-center justify-center">Calcolo in corso...</div>;

                const recap = [];
                for(let i = phases.length - 1; i >= 0; i--) {
                    const phase = phases[i];
                    const eliminatedHere = [];
                    phase.matches.forEach(m => {
                        m.players.forEach(p => { if (!m.winners.includes(p) && room.players[p]) eliminatedHere.push(room.players[p]); });
                    });
                    if (eliminatedHere.length > 0) {
                        let phaseTitle = `Eliminati in ${phase.name}`;
                        if (i === phases.length - 1) phaseTitle = "Sconfitto in Finalissima (2° Posto)";
                        else if (i === phases.length - 2) phaseTitle = "Eliminati in Top 4";
                        recap.push({ title: phaseTitle, players: eliminatedHere, color: i === phases.length - 1 ? 'text-slate-300' : 'text-slate-500' });
                    }
                }

                return (
                    <div className="h-[100dvh] w-full flex justify-center items-start bg-slate-950 p-4 md:p-8 overflow-y-auto custom-scrollbar">
                      <div className="bg-slate-800 p-6 md:p-8 rounded-3xl border-4 border-orange-500 shadow-2xl max-w-4xl w-full flex flex-col items-center my-auto">
                          <h1 className="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600 mb-8 text-center">CAMPIONE!</h1>
                          <div className="relative mb-6">
                              <img src={CHARACTERS.find(c=>c.id===winner.charId)?.i} className="w-48 h-48 rounded-full border-8 border-yellow-400 object-cover shadow-[0_0_40px_rgba(250,204,21,0.6)]" />
                              <div className="absolute -bottom-4 left-1/2 transform -translate-x-1/2 text-5xl">🏆</div>
                          </div>
                          <h2 className="text-4xl font-black mb-10 text-center" style={{color: winner.color}}>{winner.n}</h2>

                          <div className="w-full bg-slate-900 rounded-2xl p-6 border border-slate-700">
                              <h3 className="text-2xl font-bold text-center text-slate-400 mb-6">Hall of Fame - Riepilogo</h3>
                              <div className="space-y-6">
                                  {recap.map((r, i) => (
                                      <div key={i}>
                                          <h4 className={`text-sm font-black uppercase tracking-widest border-b border-slate-700 pb-2 mb-3 ${r.color}`}>{r.title}</h4>
                                          <div className="flex flex-wrap gap-4 justify-center">
                                              {r.players.map(p => {
                                                  if(!p) return null;
                                                  return (
                                                      <div key={p.id} className="flex flex-col items-center opacity-80">
                                                          <img src={CHARACTERS.find(c=>c.id===p.charId)?.i} className="w-12 h-12 rounded-full border-2 object-cover grayscale" style={{borderColor: p.color}} />
                                                          <span className="text-xs font-bold mt-1 text-slate-400 truncate w-16 text-center">{p.n}</span>
                                                      </div>
                                                  )
                                              })}
                                          </div>
                                      </div>
                                  ))}
                              </div>
                          </div>
                          {isHost && ( <button onClick={() => updateDoc(doc(getCollectionRef(), room.id), {status: 'lobby'})} className="mt-8 bg-indigo-600 px-10 py-4 rounded-xl font-black text-xl hover:bg-indigo-500 hover:scale-105 transition-all shrink-0">Torna alla Lobby</button> )}
                      </div>
                  </div>
                );
            }

            const phase = phases[currentPhase];
            const match = phase.matches[currentMatch];
            
            let isAllBots = true;
            match.players.forEach(pid => { if (room.players[pid] && !room.players[pid].isBot) isAllBots = false; });
            const isUserPlaying = match.players.includes(user.uid);

            const startMatch = async () => {
                if (!isHost) return;
                initAudio();
                const matchPlayers = match.players;
                const dynamicSize = matchPlayers.length === 2 ? 8 : (matchPlayers.length >= 16 ? 18 : (matchPlayers.length >= 8 ? 14 : 10));
                const board = generateBoard(dynamicSize, room.config.shape);
                const spawns = getSpawnPoints(dynamicSize, matchPlayers.length, board);
                
                const updates = { 
                    status: 'playing_match', turnIndex: 0, round: 1, actionState: 'rolling', movesLeft: 0, currentRoll: 0,
                    currentMatchPlayers: matchPlayers, currentMatchSize: dynamicSize, currentEvent: null,
                    lastAction: { msg: `🎮 Il match inizia! Tocca a ${room.players[matchPlayers[0]]?.n}!`, id: Date.now() }
                };
                
                matchPlayers.forEach((pid, idx) => {
                  updates[`players.${pid}.tiles`] = 1; updates[`players.${pid}.inventory`] = [];
                  updates[`players.${pid}.modifier`] = 0; updates[`players.${pid}.isTrapped`] = false;
                  updates[`players.${pid}.hasStregoneria`] = false;
                  if (spawns[idx]) { board[`${spawns[idx]}`] = { owner: pid, item: null, isSpawn: true, isWall: false }; }
                });
                updates.board = board; 
                await updateDoc(doc(getCollectionRef(), room.id), updates);
            };

            const simulateMatch = async () => {
                if (!isHost) return;
                const matchPlayers = match.players;
                const dynamicSize = matchPlayers.length === 2 ? 8 : (matchPlayers.length >= 16 ? 18 : (matchPlayers.length >= 8 ? 14 : 10));
                let fakeBoard = generateBoard(dynamicSize, room.config.shape);

                const keys = Object.keys(fakeBoard);
                keys.forEach(k => { if (fakeBoard[k]) fakeBoard[k].owner = matchPlayers[Math.floor(Math.random() * matchPlayers.length)]; });

                const tilesCount = {}; matchPlayers.forEach(p => tilesCount[p] = 0);
                Object.values(fakeBoard).forEach(c => { if(c && c.owner) tilesCount[c.owner]++; });

                const updates = { status: 'match_finished', board: fakeBoard, currentMatchPlayers: matchPlayers, currentMatchSize: dynamicSize, turnIndex: 0, actionState: 'rolling' };
                matchPlayers.forEach(pid => { updates[`players.${pid}.tiles`] = tilesCount[pid]; updates[`players.${pid}.inventory`] = []; });
                await updateDoc(doc(getCollectionRef(), room.id), updates);
            };

            return (
                <div className="h-[100dvh] bg-slate-950 text-slate-100 flex flex-col p-4 md:p-8 overflow-hidden">
                    <div className="shrink-0 mb-4 md:mb-6 text-center">
                        <h1 className="text-3xl md:text-4xl font-black text-orange-500 tracking-wider">TABELLONE TORNEO</h1>
                        <p className="text-slate-400 text-sm md:text-base">Tutti i match e le fasi della competizione</p>
                    </div>
                    
                    <div className="bg-slate-800 p-4 md:p-6 rounded-3xl border border-slate-700 shadow-2xl mb-4 md:mb-6 shrink-0">
                        <h2 className="text-lg md:text-xl font-bold mb-4 text-center text-white">
                            <span className="text-orange-400">{phase.name}</span> • Match in evidenza ({currentMatch + 1}/{phase.matches.length})
                        </h2>
                        <div className="flex flex-wrap justify-center gap-2 md:gap-4 mb-4 md:mb-6">
                            {match.players.map(pid => {
                                const p = room.players[pid]; if(!p) return null; const c = CHARACTERS.find(x => x.id === p.charId);
                                return (
                                    <div key={pid} className="flex flex-col items-center bg-slate-700 p-2 md:p-3 rounded-xl shadow border-b-4 w-24 md:w-32" style={{borderColor: p.color}}>
                                        <img src={c?.i} className="w-10 h-10 md:w-14 md:h-14 rounded-full object-cover mb-2 border-2" style={{borderColor: p.color}} />
                                        <span className="font-bold text-center text-xs md:text-sm truncate w-full" style={{color: p.color}}>{p.n}</span>
                                        {pid === user.uid && <span className="mt-1 bg-emerald-600 text-white text-[10px] px-2 py-0.5 rounded-full">TU SEI QUI</span>}
                                    </div>
                                );
                            })}
                        </div>
                        <div className="flex justify-center max-w-xl mx-auto">
                            {isHost ? (
                                <div className="flex flex-col sm:flex-row gap-3 md:gap-4 w-full">
                                    {isAllBots && ( <button onClick={simulateMatch} className="flex-1 bg-slate-600 hover:bg-slate-500 text-white font-bold py-3 md:py-4 rounded-xl transition-all shadow-md">⚡ Simula e Mostra Risultati</button> )}
                                    <button onClick={startMatch} className="flex-1 bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 md:py-4 rounded-xl shadow-[0_0_20px_rgba(249,115,22,0.4)] text-base md:text-lg transition-all">
                                        {isUserPlaying ? '👉 ENTRA E GIOCA' : '👁️ OSSERVA MATCH'}
                                    </button>
                                </div>
                            ) : (
                                <div className="text-base md:text-lg text-slate-400 animate-pulse text-center bg-slate-900 px-6 py-4 rounded-xl w-full">
                                    {isUserPlaying ? "L'Host sta per avviare la tua partita..." : "Attendi, l'host sta avviando il tavolo. (Potrai osservare)"}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="flex-1 bg-slate-800 rounded-3xl border border-slate-700 p-4 md:p-6 overflow-auto custom-scrollbar">
                        <div className="flex gap-10 min-w-max min-h-full items-stretch">
                            {phases.map((ph, pIdx) => (
                                <div key={pIdx} className="flex flex-col w-[260px] relative">
                                    <div className="text-center font-black text-slate-500 uppercase tracking-widest border-b-2 border-slate-700 pb-2 mb-4 shrink-0">{ph.name}</div>
                                    <div className="flex flex-col justify-around flex-1 gap-4">
                                        {ph.matches.map((m, mIdx) => {
                                            const isCurrentMatch = pIdx === currentPhase && mIdx === currentMatch;
                                            const isPastMatch = m.completed;
                                            const isFutureMatch = pIdx > currentPhase || (pIdx === currentPhase && mIdx > currentMatch);
                                            return (
                                                <div key={mIdx} className={`relative bg-slate-900 rounded-xl p-3 border-2 transition-all shrink-0 ${isCurrentMatch ? 'border-orange-500 shadow-[0_0_15px_rgba(249,115,22,0.5)] scale-105 z-10' : ''} ${isPastMatch ? 'border-emerald-600/50 opacity-70' : ''} ${isFutureMatch ? 'border-slate-700/50' : ''}`}>
                                                    {pIdx > 0 && <div className="absolute top-1/2 -left-5 w-5 border-t-2 border-slate-600 -z-10"></div>}
                                                    {pIdx < phases.length - 1 && <div className="absolute top-1/2 -right-5 w-5 border-t-2 border-slate-600 -z-10"></div>}
                                                    <div className="text-xs text-slate-500 mb-2 font-bold">Match {mIdx + 1}</div>
                                                    <div className="flex flex-col gap-1.5">
                                                        {Array.from({length: ph.matchSize}).map((_, slotIdx) => {
                                                            const pid = m.players[slotIdx]; const player = pid ? room.players[pid] : null; const char = player ? CHARACTERS.find(c => c.id === player.charId) : null;
                                                            const isWinner = m.winners?.includes(pid); const isEliminated = m.completed && !isWinner;
                                                            return (
                                                                <div key={slotIdx} className={`flex items-center gap-2 px-2 py-1 rounded bg-slate-800 ${isEliminated ? 'opacity-40 grayscale line-through' : ''} ${isWinner ? 'bg-emerald-900/40 ring-1 ring-emerald-500/50' : ''}`}>
                                                                    {player ? ( <><img src={char?.i} className="w-6 h-6 rounded-full object-cover shrink-0 border" style={{borderColor: player.color}} /><span className="text-sm font-bold truncate" style={{color: isEliminated ? '#94a3b8' : player.color}}>{player.n}</span></>
                                                                    ) : ( <span className="text-sm text-slate-600 italic px-8">TBD</span> )}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- GIOCO PRINCIPALE ---
        function Game({ room, user, showNotif }) {
          const isHost = room.hostId === user.uid;
          const matchPlayerOrder = (room.status.includes('match') ? room.currentMatchPlayers : room.playerOrder) || [];
          const boardSize = room.status.includes('match') ? (room.currentMatchSize || room.config.size) : room.config.size;
          
          const activePlayerId = matchPlayerOrder[room.turnIndex || 0];
          const activePlayer = activePlayerId ? room.players[activePlayerId] : null;
          
          const isPlayingThisMatch = matchPlayerOrder.includes(user.uid);
          const me = isPlayingThisMatch ? room.players[user.uid] : null;
          const isMyTurn = isPlayingThisMatch && activePlayerId === user.uid && !me?.isEliminated;
          
          const boardRef = doc(getCollectionRef(), room.id);

          const [targetAction, setTargetAction] = useState(null);
          const [usingItemSlot, setUsingItemSlot] = useState(null);
          
          const isGameEnded = room.status === 'finished' || room.status === 'match_finished';
          const [showResultsModal, setShowResultsModal] = useState(true);

          const [showItemDesc, setShowItemDesc] = useState(null);
          const touchTimer = useRef(null);
          const isLongPress = useRef(false);
          const lastActionRef = useRef(null);

          useEffect(() => { if (isGameEnded) setShowResultsModal(true); }, [isGameEnded]);

          useEffect(() => {
              if (room?.lastAction && room.lastAction.id !== lastActionRef.current) {
                  lastActionRef.current = room.lastAction.id;
                  showNotif(room.lastAction.msg);
              }
          }, [room?.lastAction]);

          // --- BOT LOGIC ---
          useEffect(() => {
            if (!isHost || !activePlayer?.isBot || !room.status.startsWith('playing') || activePlayer?.isEliminated) return;

            let timeout;
            const botPlay = async () => {
              const updates = {};
              
              if (activePlayer?.hasStregoneria) {
                  const baseRoll = Math.floor(Math.random() * 6) + 1;
                  const totalRoll = Math.max(1, baseRoll + (activePlayer?.modifier || 0));
                  
                  let currentBoard = { ...(room.board || {}) };
                  const myTiles = Object.keys(currentBoard).filter(k => currentBoard[k]?.owner === activePlayerId && !currentBoard[k]?.isSpawn);
                  const toDestroy = myTiles.sort(() => 0.5 - Math.random()).slice(0, totalRoll);
                  
                  toDestroy.forEach(k => { currentBoard[k] = { ...currentBoard[k], owner: null, item: null }; updates[`board.${k}`] = currentBoard[k]; });
                  
                  updates[`players.${activePlayerId}.tiles`] = Math.max(1, Object.keys(currentBoard).filter(k => currentBoard[k]?.owner === activePlayerId).length);
                  updates[`players.${activePlayerId}.hasStregoneria`] = false;
                  updates[`players.${activePlayerId}.modifier`] = 0;
                  updates.globalAction = { msg: `🔮 La Stregoneria distrugge ${toDestroy.length} territori di ${activePlayer?.n}!`, id: Date.now() };
                  
                  await updateDoc(boardRef, updates);
                  await nextTurn();
                  return;
              }

              const sourcePlayerId = room.currentEvent === 'tempesta' ? matchPlayerOrder[(matchPlayerOrder.indexOf(activePlayerId) + 1) % matchPlayerOrder.length] : activePlayerId;
              const playable = getPlayableTiles(sourcePlayerId, room.board || {}, boardSize, room.config.invasionMode, activePlayerId);
              
              if (playable.length === 0) {
                await nextTurn();
                return;
              }

              const baseRoll = Math.floor(Math.random() * 6) + 1;
              const mod = activePlayer?.modifier || 0;
              const totalRoll = Math.max(1, baseRoll + mod);
              
              await updateDoc(boardRef, { 
                  actionState: 'moving', currentRoll: totalRoll, movesLeft: totalRoll, [`players.${activePlayerId}.modifier`]: 0,
                  lastAction: { msg: `🎲 ${activePlayer?.n} lancia un ${totalRoll}!`, id: Date.now() }
              });

              let currentMoves = totalRoll;
              let currentBoard = { ...(room.board || {}) };
              let currentInv = [...(activePlayer?.inventory || [])];

              const makeMove = async () => {
                if (currentMoves <= 0) {
                  if (currentInv.length > 0 && room.currentEvent !== 'carestia') {
                    const item = currentInv[0];
                    if (item === 'turbo') updates[`players.${activePlayerId}.modifier`] = 2;
                    
                    if (item === 'conquista') {
                         const emptyTiles = Object.keys(currentBoard).filter(k => currentBoard[k] && !currentBoard[k].owner && !currentBoard[k].isWall);
                         if(emptyTiles.length > 0) {
                             const toClaim = emptyTiles.sort(() => 0.5 - Math.random()).slice(0, 2);
                             toClaim.forEach(k => { currentBoard[k] = { ...currentBoard[k], owner: activePlayerId, item: null }; updates[`board.${k}`] = currentBoard[k]; });
                             updates[`players.${activePlayerId}.tiles`] = Object.values(currentBoard).filter(v => v?.owner === activePlayerId).length;
                             updates.globalAction = { msg: `🏳️ ${activePlayer?.n} ha usato Conquista!`, id: Date.now() };
                         }
                    }

                    if (item === 'curse' || item === 'terremoto' || item === 'stregoneria') {
                        const enemies = matchPlayerOrder.filter(id => id !== activePlayerId && room.players[id] && !room.players[id].isTrapped && !room.players[id].isEliminated);
                        if (enemies.length > 0) {
                            const target = enemies[Math.floor(Math.random() * enemies.length)];
                            if(item === 'curse') {
                                updates[`players.${target}.modifier`] = -2;
                                updates.globalAction = { msg: `💀 ${activePlayer?.n} ha Maledetto ${room.players[target]?.n}!`, id: Date.now() };
                            }
                            if(item === 'terremoto') {
                                const targetTiles = Object.keys(currentBoard).filter(k => currentBoard[k]?.owner === target && !currentBoard[k]?.isSpawn);
                                if(targetTiles.length > 0) {
                                    const toDestroy = targetTiles.sort(() => 0.5 - Math.random()).slice(0, 2);
                                    toDestroy.forEach(k => { currentBoard[k] = { ...currentBoard[k], owner: null, item: null }; updates[`board.${k}`] = currentBoard[k]; });
                                    updates[`players.${target}.tiles`] = Object.values(currentBoard).filter(v => v?.owner === target).length;
                                    updates.globalAction = { msg: `🌋 ${activePlayer?.n} scatena un Terremoto contro ${room.players[target]?.n}!`, id: Date.now() };
                                }
                            }
                            if (item === 'stregoneria') {
                                updates[`players.${target}.hasStregoneria`] = true;
                                updates.globalAction = { msg: `🔮 ${activePlayer?.n} lancia Stregoneria su ${room.players[target]?.n}!`, id: Date.now() };
                            }
                        }
                    }
                    currentInv.shift(); 
                    updates[`players.${activePlayerId}.inventory`] = currentInv;
                  }

                  updates.actionState = 'rolling';
                  updates.movesLeft = 0;
                  await updateDoc(boardRef, updates);
                  await nextTurn();
                  return;
                }

                const dynamicSource = room.currentEvent === 'tempesta' ? matchPlayerOrder[(matchPlayerOrder.indexOf(activePlayerId) + 1) % matchPlayerOrder.length] : activePlayerId;
                const validMoves = getPlayableTiles(dynamicSource, currentBoard, boardSize, room.config.invasionMode, activePlayerId);
                if (validMoves.length === 0) { await nextTurn(); return; }

                let bestMove = validMoves[0];
                const withItem = validMoves.find(k => currentBoard[k].item);
                if (withItem) bestMove = withItem;
                else bestMove = validMoves[Math.floor(Math.random() * validMoves.length)];

                const pickedItem = currentBoard[bestMove].item;
                currentBoard[bestMove] = { ...currentBoard[bestMove], owner: activePlayerId, item: null };
                updates[`board.${bestMove}`] = currentBoard[bestMove];
                currentMoves--;
                
                if (pickedItem && currentInv.length < 2) currentInv.push(pickedItem);

                if (room.currentEvent === 'glaciale') {
                    const [cx, cy] = bestMove.split(',').map(Number);
                    const adjs = [`${cx+1},${cy}`, `${cx-1},${cy}`, `${cx},${cy+1}`, `${cx},${cy-1}`];
                    const validIce = adjs.filter(adj => currentBoard[adj] && !currentBoard[adj].owner && !currentBoard[adj].isWall);
                    if (validIce.length > 0) {
                        const icePick = validIce[Math.floor(Math.random() * validIce.length)];
                        currentBoard[icePick] = { ...currentBoard[icePick], owner: activePlayerId, item: null };
                        updates[`board.${icePick}`] = currentBoard[icePick];
                    }
                }

                await updateDoc(boardRef, {
                  ...updates,
                  movesLeft: currentMoves,
                  [`players.${activePlayerId}.tiles`]: Object.values(currentBoard).filter(v => v?.owner === activePlayerId).length,
                  [`players.${activePlayerId}.inventory`]: currentInv
                });

                const speedMult = room.config.botSpeed || 1;
                timeout = setTimeout(makeMove, 600 / speedMult);
              };

              const startSpeedMult = room.config.botSpeed || 1;
              timeout = setTimeout(makeMove, 1000 / startSpeedMult);
            };

            botPlay();
            return () => clearTimeout(timeout);
          }, [room.turnIndex, isHost, activePlayer?.isBot, room.config.botSpeed]);

          const getPlayableTiles = (sourceId, currentBoard, size, invasionMode, actualPlayerId) => {
            const valid = [];
            const actId = actualPlayerId || sourceId;
            const myTiles = Object.entries(currentBoard).filter(([_, v]) => v?.owner === sourceId).map(([k]) => k);
            myTiles.forEach(tile => {
              const [x, y] = tile.split(',').map(Number);
              const adjs = [`${x+1},${y}`, `${x-1},${y}`, `${x},${y+1}`, `${x},${y-1}`];
              adjs.forEach(adj => {
                const cell = currentBoard[adj];
                if (cell !== undefined && !cell.isWall && !valid.includes(adj)) {
                    const cellOwner = cell.owner;
                    if (invasionMode) {
                        if (cellOwner !== actId && !cell.isSpawn) valid.push(adj);
                    } else {
                        if (cellOwner === null) valid.push(adj);
                    }
                }
              });
            });
            return valid;
          };

          const nextTurn = async (extraTurn = false) => {
             let nextIdx = extraTurn ? room.turnIndex : room.turnIndex;
             let nextRound = room.round;
             const updates = {};
             updates.currentEvent = null;
             let currentBoard = { ...(room.board || {}) };
             let eliminatedThisTurn = null;
             
             if (!extraTurn) {
                 let loopCount = 0;
                 do {
                     nextIdx = (nextIdx + 1) % matchPlayerOrder.length;
                     if (nextIdx === 0) {
                         nextRound++;
                         
                         // LOGICA MODALITÀ ELIMINAZIONE (Ogni 3 round l'ultimo muore)
                         if (room.config.mode === 'elimination' && (nextRound - 1) % 3 === 0) {
                             const activePids = matchPlayerOrder.filter(pid => !room.players[pid]?.isEliminated && !updates[`players.${pid}.isEliminated`]);
                             if (activePids.length > 1) {
                                 let minTiles = Infinity;
                                 let losers = [];
                                 activePids.forEach(pid => {
                                     const t = updates[`players.${pid}.tiles`] !== undefined ? updates[`players.${pid}.tiles`] : (room.players[pid].tiles || 0);
                                     if (t < minTiles) { minTiles = t; losers = [pid]; }
                                     else if (t === minTiles) { losers.push(pid); }
                                 });
                                 const loserId = losers[Math.floor(Math.random() * losers.length)];
                                 eliminatedThisTurn = loserId;
                                 
                                 updates[`players.${loserId}.isEliminated`] = true;
                                 updates[`players.${loserId}.tiles`] = 0;
                                 updates[`players.${loserId}.inventory`] = [];
                                 updates.eliminationRank = [loserId, ...(updates.eliminationRank || room.eliminationRank || [])];
                                 
                                 // Distruzione a catena del territorio COMPLETA (inclusa la base)
                                 const loserTiles = Object.keys(currentBoard).filter(k => currentBoard[k]?.owner === loserId).sort(() => 0.5 - Math.random());
                                 loserTiles.forEach((k, i) => {
                                     currentBoard[k] = { ...currentBoard[k], owner: null, item: null, isSpawn: false, explodedAt: Date.now(), explodeDelay: i * 100, oldColor: room.players[loserId].color };
                                     updates[`board.${k}`] = currentBoard[k];
                                 });
                                 
                                 updates.globalAction = { msg: `☠️ ELIMINAZIONE! ${room.players[loserId].n} è stato distrutto!`, id: Date.now() };
                             }
                         }
                         // LOGICA METEO E DROP
                         else if (!eliminatedThisTurn && isHost && room.config.eventsEnabled && nextRound > 1 && Math.random() < 0.30) {
                             const ev = EVENT_TYPES[Math.floor(Math.random() * EVENT_TYPES.length)];
                             updates.globalAction = { msg: `🚨 METEO: ${ev.n}! ${ev.desc}`, id: Date.now() };
                             
                             if (ev.id === 'tempesta' || ev.id === 'carestia' || ev.id === 'glaciale') {
                                 updates.currentEvent = ev.id;
                             } 
                             else if (ev.id === 'robin_hood') {
                                 const activePids = matchPlayerOrder.filter(pid => !room.players[pid]?.isEliminated);
                                 const sortedPlayers = [...activePids].sort((a, b) => (room.players[b].tiles || 0) - (room.players[a].tiles || 0));
                                 const first = sortedPlayers[0]; const last = sortedPlayers[sortedPlayers.length - 1];
                                 
                                 let firstTiles = Object.keys(currentBoard).filter(k => currentBoard[k]?.owner === first && !currentBoard[k]?.isSpawn);
                                 const toLose = firstTiles.sort(() => 0.5 - Math.random()).slice(0, 3);
                                 toLose.forEach(k => { currentBoard[k] = { ...currentBoard[k], owner: null, item: null }; updates[`board.${k}`] = currentBoard[k]; });
                                 updates[`players.${first}.tiles`] = Math.max(1, (room.players[first].tiles || 1) - toLose.length);

                                 let emptyTiles = Object.keys(currentBoard).filter(k => currentBoard[k] && !currentBoard[k].owner && !currentBoard[k].isWall);
                                 const toGain = emptyTiles.sort(() => 0.5 - Math.random()).slice(0, 3);
                                 toGain.forEach(k => { currentBoard[k] = { ...currentBoard[k], owner: last, item: null }; updates[`board.${k}`] = currentBoard[k]; });
                                 updates[`players.${last}.tiles`] = (room.players[last].tiles || 1) + toGain.length;
                             }
                             else if (ev.id === 'festa') {
                                 matchPlayerOrder.filter(pid => !room.players[pid]?.isEliminated).forEach(pid => { updates[`players.${pid}.modifier`] = (room.players[pid].modifier || 0) + 2; });
                             }
                             else if (ev.id === 'cataclisma') {
                                 const allOwned = Object.keys(currentBoard).filter(k => currentBoard[k]?.owner && !currentBoard[k]?.isSpawn);
                                 const toDestroy = allOwned.sort(() => 0.5 - Math.random()).slice(0, Math.max(1, Math.floor(allOwned.length * 0.15)));
                                 toDestroy.forEach(k => { currentBoard[k] = { ...currentBoard[k], owner: null, item: null }; updates[`board.${k}`] = currentBoard[k]; });
                                 matchPlayerOrder.filter(pid => !room.players[pid]?.isEliminated).forEach(pid => { updates[`players.${pid}.tiles`] = Object.values(currentBoard).filter(v => v?.owner === pid).length; });
                             }
                             else if (ev.id === 'meteoriti') {
                                 let emptyTilesMet = Object.keys(currentBoard).filter(k => currentBoard[k] && !currentBoard[k].owner && !currentBoard[k].isSpawn && !currentBoard[k].item);
                                 const meteors = emptyTilesMet.sort(() => 0.5 - Math.random()).slice(0, 2);
                                 meteors.forEach(k => { currentBoard[k] = { ...currentBoard[k], owner: null, item: null, isWall: true }; updates[`board.${k}`] = currentBoard[k]; });
                             }
                         }
                         else if (!eliminatedThisTurn && isHost && Math.random() < (room.config.mode === 'elimination' ? 0.15 : 0.08)) {
                             const emptyTiles = Object.keys(currentBoard).filter(k => currentBoard[k] && !currentBoard[k].owner && !currentBoard[k].item && !currentBoard[k].isWall);
                             if (emptyTiles.length > 0) {
                                 const randomTile = emptyTiles[Math.floor(Math.random() * emptyTiles.length)];
                                 const randomItem = ITEMS[Math.floor(Math.random() * ITEMS.length)].id;
                                 updates[`board.${randomTile}.item`] = randomItem;
                                 updates.globalAction = { msg: `🎁 Un nuovo strumento è apparso sulla mappa!`, id: Date.now() };
                             }
                         }
                     }
                     loopCount++;
                     if(loopCount > matchPlayerOrder.length * 2) break; // Safety break
                 } while (
                     (room.players[matchPlayerOrder[nextIdx]]?.isEliminated || updates[`players.${matchPlayerOrder[nextIdx]}.isEliminated`] || eliminatedThisTurn === matchPlayerOrder[nextIdx]) 
                     && matchPlayerOrder.filter(pid => !room.players[pid]?.isEliminated && !updates[`players.${pid}.isEliminated`] && pid !== eliminatedThisTurn).length > 0
                 );
             }

             const activeAfterUpdates = matchPlayerOrder.filter(pid => !room.players[pid]?.isEliminated && !updates[`players.${pid}.isEliminated`] && pid !== eliminatedThisTurn);
             const totalTiles = Object.keys(currentBoard).filter(k => !currentBoard[k]?.isWall).length;
             const ownedTiles = Object.values(currentBoard).filter(v => v?.owner).length;
             
             if (activeAfterUpdates.length <= 1 || nextRound > room.config.maxRounds || ownedTiles >= totalTiles) {
                 if (activeAfterUpdates.length === 1 && room.config.mode === 'elimination') {
                     const winnerId = activeAfterUpdates[0];
                     updates.eliminationRank = [winnerId, ...(updates.eliminationRank || room.eliminationRank || [])];
                 }
                 updates.status = room.status.includes('match') ? 'match_finished' : 'finished';
                 await updateDoc(boardRef, updates);
                 return;
             }

             updates.turnIndex = nextIdx; updates.round = nextRound; updates.actionState = 'rolling'; updates.movesLeft = 0; updates.currentRoll = 0;
             if(!eliminatedThisTurn) updates.lastAction = { msg: `👉 Tocca a ${room.players[matchPlayerOrder[nextIdx]]?.n}!`, id: Date.now() };
             await updateDoc(boardRef, updates);
          };

          const rollDice = async () => {
            initAudio();
            if (!isMyTurn || room.actionState !== 'rolling' || isGameEnded) return;
            
            const base = Math.floor(Math.random() * 6) + 1;
            const mod = activePlayer?.modifier || 0;
            const total = Math.max(1, base + mod);

            if (activePlayer?.hasStregoneria) {
                let currentBoard = { ...(room.board || {}) };
                const myTiles = Object.keys(currentBoard).filter(k => currentBoard[k]?.owner === user.uid && !currentBoard[k]?.isSpawn);
                const toDestroy = myTiles.sort(() => 0.5 - Math.random()).slice(0, total);
                
                const updates = {};
                toDestroy.forEach(k => {
                    currentBoard[k] = { ...currentBoard[k], owner: null, item: null };
                    updates[`board.${k}`] = currentBoard[k];
                });
                
                updates[`players.${user.uid}.tiles`] = Math.max(1, Object.keys(currentBoard).filter(k => currentBoard[k]?.owner === user.uid).length);
                updates[`players.${user.uid}.hasStregoneria`] = false;
                updates[`players.${user.uid}.modifier`] = 0;
                updates.globalAction = { msg: `🔮 La Stregoneria distrugge ${toDestroy.length} caselle di ${activePlayer?.n}!`, id: Date.now() };

                await updateDoc(boardRef, updates);
                showNotif(`La stregoneria ti ha tolto ${toDestroy.length} caselle!`);
                nextTurn(); 
                return;
            }
