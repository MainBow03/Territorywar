            const sourceId = room.currentEvent === 'tempesta' ? matchPlayerOrder[(matchPlayerOrder.indexOf(user.uid) + 1) % matchPlayerOrder.length] : user.uid;
            const playable = getPlayableTiles(sourceId, room.board || {}, boardSize, room.config.invasionMode, user.uid);
            if (playable.length === 0) {
                await updateDoc(boardRef, { [`players.${user.uid}.isTrapped`]: true });
                nextTurn();
                return;
            }

            await updateDoc(boardRef, { 
                actionState: 'moving', currentRoll: total, movesLeft: total, [`players.${user.uid}.modifier`]: 0,
                lastAction: { msg: `🎲 ${activePlayer?.n} ha lanciato un ${total}!`, id: Date.now() }
            });
          };

          const clickTile = async (key) => {
            if (!isMyTurn || room.actionState !== 'moving' || room.movesLeft <= 0 || isGameEnded) return;
            
            const sourceId = room.currentEvent === 'tempesta' ? matchPlayerOrder[(matchPlayerOrder.indexOf(user.uid) + 1) % matchPlayerOrder.length] : user.uid;
            const playable = getPlayableTiles(sourceId, room.board || {}, boardSize, room.config.invasionMode, user.uid);
            if (!playable.includes(key)) return;

            const cell = room.board[key];
            let newInv = [...(activePlayer?.inventory || [])];
            
            if (cell.item && newInv.length < 2) {
                newInv.push(cell.item);
                const foundItem = ITEMS.find(i=>i.id === cell.item);
                if (foundItem) { showNotif(`Hai trovato: ${foundItem.n}!`); playItemSound(); }
            } else {
                playMoveSound();
            }

            const newBoard = {...room.board, [key]: { ...room.board[key], owner: user.uid, item: null }};
            const updates = { [`board.${key}`]: newBoard[key], movesLeft: room.movesLeft - 1, [`players.${user.uid}.inventory`]: newInv };

            if (room.currentEvent === 'glaciale') {
                const [cx, cy] = key.split(',').map(Number);
                const adjs = [`${cx+1},${cy}`, `${cx-1},${cy}`, `${cx},${cy+1}`, `${cx},${cy-1}`];
                const validIce = adjs.filter(adj => newBoard[adj] && !newBoard[adj].owner && !newBoard[adj].isWall);
                if (validIce.length > 0) {
                    const icePick = validIce[Math.floor(Math.random() * validIce.length)];
                    newBoard[icePick] = { ...newBoard[icePick], owner: user.uid, item: null };
                    updates[`board.${icePick}`] = newBoard[icePick];
                }
            }

            updates[`players.${user.uid}.tiles`] = Object.values(newBoard).filter(v => v?.owner === user.uid).length;
            await updateDoc(boardRef, updates);

            const newPlayable = getPlayableTiles(sourceId, newBoard, boardSize, room.config.invasionMode, user.uid);
            if (room.movesLeft - 1 === 0 || newPlayable.length === 0) {
                await updateDoc(boardRef, { actionState: 'items_or_end' });
            }
          };

          const endTurnBtn = () => { initAudio(); nextTurn(); };

          const useItem = async (slotIdx, itemId) => {
              if (!isMyTurn || isGameEnded) return;
              if (room.currentEvent === 'carestia') return showNotif("Carestia in corso: non puoi usare oggetti!");
              
              if (itemId === 'turbo') {
                  await updateDoc(boardRef, { [`players.${user.uid}.modifier`]: 2 });
                  consumeItem(slotIdx); showNotif("Turbo attivato! +2 al prossimo lancio.");
              } 
              else if (itemId === 'jackpot' && room.actionState === 'items_or_end') {
                  consumeItem(slotIdx); showNotif("JACKPOT! Giochi di nuovo!"); nextTurn(true); 
              } 
              else if (itemId === 'conquista') {
                  let currentBoard = { ...(room.board || {}) };
                  const emptyTiles = Object.keys(currentBoard).filter(k => currentBoard[k] && !currentBoard[k].owner && !currentBoard[k].isWall);
                  if (emptyTiles.length === 0) return showNotif("Non ci sono caselle libere da conquistare!");
                  
                  const toClaim = emptyTiles.sort(() => 0.5 - Math.random()).slice(0, 2);
                  const updates = {};
                  toClaim.forEach(k => { currentBoard[k] = { ...currentBoard[k], owner: user.uid, item: null }; updates[`board.${k}`] = currentBoard[k]; });
                  updates[`players.${user.uid}.tiles`] = Object.values(currentBoard).filter(v => v?.owner === user.uid).length;
                  updates.globalAction = { msg: `🏳️ ${me?.n} usa Conquista e ottiene territori liberi!`, id: Date.now() };
                  
                  await updateDoc(boardRef, updates); consumeItem(slotIdx); showNotif("Hai conquistato nuovi territori!");
              }
              else if (itemId === 'curse' || itemId === 'terremoto' || itemId === 'stregoneria') {
                  setTargetAction(itemId); setUsingItemSlot(slotIdx);
                  showNotif(`Seleziona un bersaglio dalla classifica per ${ITEMS.find(i=>i.id===itemId)?.n || ''}`);
              } 
              else { showNotif("Non puoi usare questo oggetto ora."); }
          };

          const applyTargetItem = async (targetId) => {
              if (targetId === user.uid) return showNotif("Non puoi selezionare te stesso!");
              const updates = {}; const targetName = room.players[targetId]?.n;
              
              if (targetAction === 'curse') {
                  updates[`players.${targetId}.modifier`] = -2;
                  updates.globalAction = { msg: `💀 ${me?.n} usa Maledizione su ${targetName}!`, id: Date.now() };
                  consumeItem(usingItemSlot); showNotif(`Maledizione lanciata su ${targetName}!`);
              } 
              else if (targetAction === 'terremoto') {
                  let currentBoard = { ...(room.board || {}) };
                  const targetTiles = Object.keys(currentBoard).filter(k => currentBoard[k]?.owner === targetId && !currentBoard[k]?.isSpawn);
                  if (targetTiles.length === 0) { setTargetAction(null); return showNotif("Questo giocatore non ha più territori!"); }
                  
                  const toDestroy = targetTiles.sort(() => 0.5 - Math.random()).slice(0, 2);
                  toDestroy.forEach(k => { currentBoard[k] = { ...currentBoard[k], owner: null, item: null }; updates[`board.${k}`] = currentBoard[k]; });
                  updates[`players.${targetId}.tiles`] = Object.values(currentBoard).filter(v => v?.owner === targetId).length;
                  updates.globalAction = { msg: `🌋 ${me?.n} scatena un Terremoto sui territori di ${targetName}!`, id: Date.now() };
                  
                  consumeItem(usingItemSlot); showNotif(`Hai distrutto le caselle di ${targetName}!`);
              }
              else if (targetAction === 'stregoneria') {
                  updates[`players.${targetId}.hasStregoneria`] = true;
                  updates.globalAction = { msg: `🔮 ${me?.n} lancia Stregoneria su ${targetName}!`, id: Date.now() };
                  consumeItem(usingItemSlot); showNotif(`Stregoneria lanciata su ${targetName}!`);
              }
              await updateDoc(boardRef, updates); setTargetAction(null);
          };

          const consumeItem = async (slotIdx) => {
              const newInv = [...(activePlayer?.inventory || [])]; newInv.splice(slotIdx, 1);
              await updateDoc(boardRef, { [`players.${user.uid}.inventory`]: newInv });
          };

          const toggleBotSpeed = async () => {
              if(!isHost) return; const newSpeed = room.config.botSpeed === 2 ? 1 : 2;
              await updateDoc(boardRef, { 'config.botSpeed': newSpeed }); showNotif(`Velocità Bot: x${newSpeed}`);
          };

          const sourceForPlayable = room.currentEvent === 'tempesta' ? matchPlayerOrder[(matchPlayerOrder.indexOf(user.uid) + 1) % matchPlayerOrder.length] : user.uid;
          const playableTiles = useMemo(() => isMyTurn && room.actionState === 'moving' && !isGameEnded ? getPlayableTiles(sourceForPlayable, room.board || {}, boardSize, room.config.invasionMode, user.uid) : [], [isMyTurn, room.actionState, room.board, boardSize, user.uid, isGameEnded, room.config.invasionMode, room.currentEvent, sourceForPlayable]);
          
          // Costruzione Leaderboard aggiornata per Eliminazione
          const leaderboard = matchPlayerOrder.map(id => room.players[id]).filter(Boolean).sort((a, b) => {
              if (room.config.mode === 'elimination') {
                  if (a.isEliminated && !b.isEliminated) return 1;
                  if (!a.isEliminated && b.isEliminated) return -1;
                  if (a.isEliminated && b.isEliminated) {
                      const rankA = room.eliminationRank?.indexOf(a.id) ?? -1;
                      const rankB = room.eliminationRank?.indexOf(b.id) ?? -1;
                      return rankA - rankB; 
                  }
              }
              return (b.tiles||0) - (a.tiles||0);
          });
          
          const iconSizeClass = boardSize > 14 ? 'text-xs md:text-sm' : (boardSize > 10 ? 'text-base md:text-lg' : 'text-xl md:text-3xl');

          const isTournament = room.status === 'match_finished';
          let winnersCount = 1;
          if (isTournament) {
              if (matchPlayerOrder.length >= 8) winnersCount = 4;
              else if (matchPlayerOrder.length === 4) winnersCount = 2;
              else winnersCount = 1;
          }
          const topPlayers = leaderboard.slice(0, winnersCount); const eliminatedPlayers = leaderboard.slice(winnersCount); const topPlayerIds = topPlayers.map(p => p.id);

          const activeEventObj = room.currentEvent ? EVENT_TYPES.find(e => e.id === room.currentEvent) : null;

          return (
            <div className="h-[100dvh] flex flex-col bg-slate-900 text-slate-100 overflow-hidden relative">
              
              {/* SCHERMATA RISULTATI */}
              {isGameEnded && showResultsModal && (
                  <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
                      <div className="bg-slate-800 p-6 md:p-10 rounded-3xl border border-slate-600 shadow-2xl max-w-4xl w-full max-h-full overflow-y-auto flex flex-col items-center">
                          <h1 className="text-4xl md:text-5xl font-black text-center mb-8 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600">{isTournament ? 'RISULTATI DEL MATCH' : 'FINE PARTITA!'}</h1>
                          {isTournament ? (
                              <div className="flex flex-col md:flex-row gap-6 w-full">
                                  <div className="flex-1 bg-emerald-900/20 p-6 rounded-2xl border border-emerald-500/30">
                                      <h3 className="text-xl text-emerald-400 font-black mb-4 text-center tracking-wide">QUALIFICATI</h3>
                                      <div className="grid gap-3">
                                          {topPlayers.map((p, idx) => {
                                              if(!p) return null;
                                              return (
                                                  <div key={p.id} className="flex items-center gap-4 bg-emerald-900/40 p-3 rounded-xl border border-emerald-500/50 shadow-sm">
                                                      <div className="font-bold text-emerald-500 w-4">{idx+1}</div>
                                                      <img src={CHARACTERS.find(c=>c.id===p.charId)?.i} className="w-12 h-12 rounded-full border-2 object-cover shrink-0" style={{borderColor: p.color}} />
                                                      <div className="flex-1 min-w-0"><div className="font-bold truncate" style={{color: p.color}}>{p.n}</div><div className="text-xs text-emerald-200/70">{p.tiles} territori</div></div>
                                                  </div>
                                              )
                                          })}
                                      </div>
                                  </div>
                                  {eliminatedPlayers.length > 0 && (
                                      <div className="flex-1 bg-red-900/20 p-6 rounded-2xl border border-red-500/30">
                                          <h3 className="text-xl text-red-400 font-black mb-4 text-center tracking-wide">ELIMINATI</h3>
                                          <div className="grid gap-3 opacity-80">
                                              {eliminatedPlayers.map((p, idx) => {
                                                  if(!p) return null;
                                                  return (
                                                      <div key={p.id} className="flex items-center gap-4 bg-red-900/40 p-3 rounded-xl border border-red-500/30 grayscale">
                                                          <div className="font-bold text-red-500/50 w-4">{idx+1+winnersCount}</div>
                                                          <img src={CHARACTERS.find(c=>c.id===p.charId)?.i} className="w-12 h-12 rounded-full border-2 object-cover shrink-0 border-slate-600" />
                                                          <div className="flex-1 min-w-0"><div className="font-bold truncate text-slate-400">{p.n}</div><div className="text-xs text-red-200/50">{p.tiles} territori</div></div>
                                                      </div>
                                                  )
                                              })}
                                          </div>
                                      </div>
                                  )}
                              </div>
                          ) : (
                              <div className="flex flex-col items-center w-full">
                                  <h2 className="text-3xl font-bold mb-6 text-yellow-400">Classifica Finale</h2>
                                  <div className="w-full max-w-lg bg-slate-900/60 rounded-2xl p-4 md:p-6 grid gap-4 border border-slate-700">
                                      {leaderboard.map((p, idx) => {
                                          if(!p) return null;
                                          return (
                                              <div key={p.id} className={`flex items-center gap-4 bg-slate-800 p-3 md:p-4 rounded-xl border-2 transition-all ${idx === 0 ? 'border-yellow-400 shadow-[0_0_20px_rgba(250,204,21,0.4)] scale-105' : 'border-slate-700'} ${p.isEliminated ? 'opacity-50 grayscale' : ''}`}>
                                                  <div className={`font-black w-8 text-center ${idx === 0 ? 'text-yellow-400 text-3xl' : 'text-slate-500 text-xl'}`}>{idx+1}°</div>
                                                  <img src={CHARACTERS.find(c=>c.id===p.charId)?.i} className={`w-14 h-14 rounded-full object-cover shrink-0 ${idx === 0 ? 'border-4 border-yellow-400' : 'border-2 border-slate-600'}`} style={idx !== 0 ? {borderColor: p.color} : {}} />
                                                  <div className="flex-1 min-w-0 text-left">
                                                      <div className="font-bold truncate text-xl" style={{color: p.color}}>
                                                          {p.n} {p.isEliminated && <span className="text-red-500 text-xs ml-2">☠️ ELIMINATO</span>}
                                                      </div>
                                                      <div className="text-sm text-slate-400">{p.tiles} territori {p.isEliminated ? 'al momento della morte' : 'conquistati'}</div>
                                                  </div>
                                                  {idx === 0 && <div className="text-4xl animate-bounce">🏆</div>}
                                              </div>
                                          )
                                      })}
                                  </div>
                              </div>
                          )}
                          <div className="mt-10 flex flex-col sm:flex-row justify-center items-center gap-4 w-full">
                              <button onClick={() => setShowResultsModal(false)} className="w-full sm:w-auto px-6 py-3 rounded-xl font-bold bg-slate-700 hover:bg-slate-600 transition-colors border border-slate-500">👁️ Osserva Mappa Finale</button>
                              {isHost && ( <button onClick={() => isTournament ? handleTournamentMatchEnd(room, topPlayerIds) : updateDoc(boardRef, {status: 'lobby'})} className="w-full sm:w-auto px-8 py-3 rounded-xl font-black bg-orange-600 hover:bg-orange-500 transition-colors shadow-lg">{isTournament ? 'Ritorna al Tabellone Torneo' : 'Torna alla Lobby'}</button> )}
                              {!isHost && isTournament && <span className="text-slate-400 animate-pulse text-sm">In attesa dell'Host...</span>}
                          </div>
                      </div>
                  </div>
              )}

              {isGameEnded && !showResultsModal && (
                  <button onClick={() => setShowResultsModal(true)} className="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-40 bg-slate-800/90 backdrop-blur px-8 py-4 rounded-full font-black text-lg shadow-[0_0_20px_rgba(0,0,0,0.8)] border-2 border-indigo-500 text-white hover:bg-slate-700 transition-all hover:scale-105">🔙 TORNA AI RISULTATI</button>
              )}

              <div className="bg-slate-800 p-3 shadow-md flex justify-between items-center z-10 border-b border-slate-700 shrink-0">
                  <div className="flex flex-col items-start gap-1">
                      <div className="flex items-center gap-4">
                          <div className="text-xl font-bold bg-slate-700 px-4 py-2 rounded-lg">{isGameEnded ? 'FINE PARTITA' : `Round ${room.round}/${room.config.maxRounds}`}</div>
                          {room.config.mode === 'tournament' && ( <div className="text-orange-400 font-bold bg-slate-900 px-3 py-1 rounded border border-orange-500/50 hidden sm:block">TORNEO</div> )}
                      </div>
                      {room.config.mode === 'elimination' && !isGameEnded && (
                          <div className="text-[10px] sm:text-xs font-bold text-red-400 bg-red-950/50 px-2 py-0.5 rounded border border-red-500/30">
                              ☠️ Elim. tra {Math.ceil((room.round) / 3) * 3 + 1 - room.round} round!
                          </div>
                      )}
                      {activeEventObj && !isGameEnded && (
                          <div className="text-xs font-bold text-white bg-purple-700 px-3 py-1 rounded-full flex items-center gap-2 event-active mt-1">
                              <span>{activeEventObj.i}</span> {activeEventObj.n} Attivo!
                          </div>
                      )}
                  </div>
                  
                  <div className="flex gap-2 overflow-x-auto mx-4 scrollbar-hide">
                      {matchPlayerOrder.map((pid, idx) => {
                          const p = room.players[pid]; if (!p) return null; const c = CHARACTERS.find(x => x.id === p.charId); const isActive = idx === room.turnIndex && !isGameEnded;
                          return (
                              <div key={pid} className={`relative transition-all duration-300 ${isActive ? 'transform scale-110 z-10' : 'opacity-60 scale-90'} ${p.isEliminated ? 'grayscale opacity-20' : ''}`}>
                                  <img src={c?.i} className={`w-14 h-14 rounded-full border-4 object-cover ${isActive ? 'animate-pulse shadow-[0_0_15px_currentColor]' : ''}`} style={{borderColor: p.color, color: p.color}} />
                                  {p.modifier !== 0 && <span className="absolute -top-2 -right-2 bg-slate-900 rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold border border-slate-600">{p.modifier>0?'+'+p.modifier:p.modifier}</span>}
                                  {p.hasStregoneria && <span className="absolute -bottom-2 -left-2 bg-purple-900 rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold border border-purple-500 shadow-[0_0_10px_purple]">🔮</span>}
                                  {p.isEliminated && <span className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-2xl drop-shadow-md">☠️</span>}
                              </div>
                          )
                      })}
                  </div>
                  <div className="text-right flex flex-col items-end">
                     <span className="text-sm text-slate-400">{isGameEnded ? 'Vincitore:' : 'Tocca a:'}</span>
                     <span className="text-xl font-black" style={{color: isGameEnded ? leaderboard[0]?.color : activePlayer?.color}}>{isGameEnded ? leaderboard[0]?.n : `${activePlayer?.n || ''} ${activePlayer?.isBot ? '(BOT)' : ''}`}</span>
                  </div>
              </div>

              <div className="flex flex-1 overflow-hidden">
                  <div className="flex-1 w-full h-full relative bg-slate-950 flex flex-col items-center justify-center p-2 md:p-6 overflow-hidden min-h-0 min-w-0">
                      
                      {targetAction !== null && !isGameEnded && (
                          <div className="absolute inset-0 z-20 bg-black/50 flex flex-col items-center justify-center">
                             <h2 className="text-3xl font-bold text-white animate-pulse text-center p-4">Seleziona il bersaglio in classifica! 👉</h2>
                             <button onClick={() => setTargetAction(null)} className="mt-4 bg-slate-800 px-6 py-3 rounded-full font-bold border border-slate-500 hover:bg-slate-700">Annulla Mossa</button>
                          </div>
                      )}

                      <div 
                          className={`bg-slate-700/50 rounded-xl shadow-2xl grid transition-all duration-700 ${isGameEnded && !showResultsModal ? 'scale-100 shadow-[0_0_30px_rgba(255,255,255,0.1)]' : ''}`}
                          style={{ maxHeight: '100%', maxWidth: '100%', width: 'min(100%, 100vh)', height: 'auto', aspectRatio: '1 / 1', gridTemplateColumns: `repeat(${boardSize}, minmax(0, 1fr))`, gridTemplateRows: `repeat(${boardSize}, minmax(0, 1fr))`, gap: boardSize > 12 ? '1px' : '2px', padding: boardSize > 12 ? '1px' : '2px' }}
                      >
                          {Array.from({length: boardSize * boardSize}).map((_, i) => {
                              const x = i % boardSize; const y = Math.floor(i / boardSize); const key = `${x},${y}`;
                              const cell = room.board?.[key];

                              if (!cell) return <div key={key} className="bg-transparent" />;
                              const isPlayable = playableTiles.includes(key);
                              const ownerPlayer = cell.owner ? room.players[cell.owner] : null;
                              
                              const isExploding = cell.explodedAt && (Date.now() - cell.explodedAt < 4000);
                              
                              const ownerColor = ownerPlayer ? ownerPlayer.color : (isExploding ? cell.oldColor : (cell.isWall ? '#0f172a' : '#1e293b')); 
                              const ownerCharId = ownerPlayer ? ownerPlayer.charId : null;
                              const ownerCharImg = ownerCharId ? CHARACTERS.find(c => c.id === ownerCharId)?.i : null;

                              let cellStyle = { backgroundColor: ownerColor };
                              if (cell.owner && ownerCharImg) {
                                  const overlayColor = ownerColor.length === 7 ? ownerColor + '99' : ownerColor;
                                  cellStyle = { backgroundImage: `linear-gradient(${overlayColor}, ${overlayColor}), url(${ownerCharImg})`, backgroundSize: 'cover', backgroundPosition: 'center', boxShadow: `inset 0 0 0 1px rgba(0,0,0,0.3)` };
                              }
                              if (cell.isWall) { cellStyle = { backgroundColor: '#0f172a', backgroundImage: 'radial-gradient(#1e293b 10%, transparent 20%), radial-gradient(#1e293b 10%, transparent 20%)', backgroundSize: '10px 10px', backgroundPosition: '0 0, 5px 5px' }; }
                              if (isExploding) { cellStyle.animationDelay = `${cell.explodeDelay || 0}ms`; }

                              return (
                                  <div 
                                      key={key} onClick={() => clickTile(key)}
                                      className={`relative transition-all duration-200 flex items-center justify-center overflow-hidden rounded-sm w-full h-full aspect-square
                                          ${isPlayable ? 'cursor-pointer animate-pulse z-10 scale-[1.03] ring-2 ring-white/70 shadow-xl' : ''}
                                          ${!cell.owner && !isPlayable && !cell.isWall && !isExploding ? 'opacity-80 hover:opacity-100' : ''}
                                          ${cell.isWall ? 'border border-slate-900 shadow-inner' : ''}
                                          ${isExploding ? 'explode-anim' : ''}
                                      `}
                                      style={cellStyle}
                                  >
                                      {cell.item && <span className={`${iconSizeClass} drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] z-0 pointer-events-none`}>{ITEMS.find(i => i.id === cell.item)?.icon}</span>}
                                      {cell.isSpawn && <span className="absolute bottom-0.5 right-0.5 text-[10px] md:text-sm opacity-80 drop-shadow-[0_1px_1px_rgba(0,0,0,0.8)] pointer-events-none">🏠</span>}
                                      {cell.isWall && <span className={`${iconSizeClass} opacity-50 drop-shadow-md pointer-events-none`}>☄️</span>}
                                      {isPlayable && <div className="absolute inset-0 bg-white/20 rounded-sm hover:bg-white/40 pointer-events-none"></div>}
                                  </div>
                              );
                          })}
                      </div>
                  </div>

                  <div className="w-80 bg-slate-800 border-l border-slate-700 flex flex-col shadow-[-10px_0_20px_rgba(0,0,0,0.3)] z-10 shrink-0">
                      <div className="p-4 border-b border-slate-700 bg-slate-800/80 backdrop-blur shrink-0">
                          <h3 className="font-black text-xl mb-1 flex items-center justify-between">🏆 Classifica
                            {isHost && !isGameEnded && <button onClick={toggleBotSpeed} className="text-xs bg-slate-700 px-2 py-1 rounded text-slate-300">Bot Speed x{room.config.botSpeed || 1}</button>}
                          </h3>
                      </div>
                      
                      <div className="flex-1 overflow-y-auto p-2 space-y-2">
                          {leaderboard.map((p, idx) => {
                              if(!p) return null;
                              const c = CHARACTERS.find(x => x.id === p.charId);
                              const isTargetable = targetAction !== null && p.id !== user.uid && !p.isTrapped && !p.isEliminated;
                              const isEliminated = (isGameEnded && idx >= winnersCount) || p.isEliminated;
                              
                              return (
                                  <div 
                                      key={p.id} onClick={() => isTargetable && applyTargetItem(p.id)}
                                      className={`flex items-center p-2 rounded-xl border-l-4 bg-slate-700/50 transition-all
                                          ${p.id === activePlayerId && !isGameEnded ? 'ring-1 ring-white/30' : ''}
                                          ${isTargetable ? 'cursor-pointer hover:bg-slate-600 ring-2 ring-red-500 animate-pulse scale-105' : ''}
                                          ${isEliminated ? 'opacity-40 grayscale' : ''}
                                      `}
                                      style={{borderColor: p.color}}
                                  >
                                      <div className="font-bold text-slate-500 w-4">{idx+1}</div>
                                      <img src={c?.i} className="w-10 h-10 rounded object-cover mx-2 border border-slate-600" />
                                      <div className="flex-1 min-w-0">
                                          <div className="font-bold text-sm truncate" style={{color: p.color}}>
                                              {p.n} {p.isEliminated && <span className="text-red-500 text-xs ml-1">☠️</span>}
                                          </div>
                                          <div className="text-xs text-slate-300">{p.tiles} caselle</div>
                                      </div>
                                      <div className="flex gap-1 ml-1">
                                          {p.inventory?.map((itemId, i) => {
                                              const it = ITEMS.find(x => x.id === itemId);
                                              if(!it) return null;
                                              return (<span key={i} className="text-sm bg-slate-800 rounded p-0.5" title={it.n}>{it.icon}</span>)
                                          })}
                                      </div>
                                  </div>
                              );
                          })}
                      </div>

                      {!isGameEnded && (
                          <div className="p-4 bg-slate-900 border-t border-slate-700 shrink-0">
                              <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Pannello Controllo</h4>
                              
                              {!isPlayingThisMatch ? ( <div className="text-center py-4 text-slate-400 italic bg-slate-800 rounded-xl">Spettatore 🍿</div>
                              ) : me?.isEliminated ? ( <div className="text-center py-4 text-red-500 font-bold bg-red-950/30 rounded-xl border border-red-500/50">Sei stato eliminato. ☠️</div>
                              ) : !isMyTurn ? ( <div className="text-center py-4 text-slate-500 font-bold bg-slate-800 rounded-xl">In attesa...</div>
                              ) : (
                                  <div className="space-y-3">
                                      {room.actionState === 'rolling' && (
                                          <button onClick={rollDice} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl shadow-[0_4px_14px_0_rgba(79,70,229,0.39)]">🎲 LANCIA DADO</button>
                                      )}
                                      {room.actionState === 'moving' && (
                                          <div className="bg-slate-800 p-3 rounded-xl text-center border border-indigo-500/50">
                                              <div className="text-sm text-slate-400 mb-1">Mosse Rimanenti</div>
                                              <div className="text-4xl font-black text-indigo-400">{room.movesLeft}</div>
                                          </div>
                                      )}
                                      {room.actionState === 'items_or_end' && (
                                          <button onClick={endTurnBtn} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl shadow-lg">Termina Turno</button>
                                      )}

                                      <div className="mt-4">
                                          <div className="text-xs text-slate-400 mb-2">Inventario (Max 2)</div>
                                          <div className="flex gap-2">
                                              {[0, 1].map(slot => {
                                                  const itemId = me?.inventory?.[slot]; const item = itemId ? ITEMS.find(i => i.id === itemId) : null;
                                                  return (
                                                      <button 
                                                          key={slot}
                                                          disabled={!item || (room.actionState === 'rolling' && item?.id === 'jackpot') || room.currentEvent === 'carestia'} 
                                                          onClick={(e) => { if (isLongPress.current) { e.preventDefault(); isLongPress.current = false; return; } useItem(slot, itemId); }}
                                                          onContextMenu={(e) => e.preventDefault()}
                                                          onTouchStart={() => { isLongPress.current = false; touchTimer.current = setTimeout(() => { isLongPress.current = true; setShowItemDesc(slot); }, 400); }}
                                                          onTouchEnd={(e) => { clearTimeout(touchTimer.current); if (isLongPress.current) e.preventDefault(); setShowItemDesc(null); }}
                                                          onTouchMove={() => { clearTimeout(touchTimer.current); setShowItemDesc(null); }}
                                                          onMouseLeave={() => setShowItemDesc(null)} onMouseEnter={() => setShowItemDesc(slot)}
                                                          className={`flex-1 h-14 rounded-lg flex items-center justify-center text-2xl border relative ${item && room.currentEvent !== 'carestia' ? 'bg-slate-700 border-slate-500 hover:border-white cursor-pointer' : 'bg-slate-800/50 border-slate-700 border-dashed cursor-not-allowed'} `}
                                                      >
                                                          {item ? item.icon : ''}
                                                          {showItemDesc === slot && item && (
                                                              <div className="absolute bottom-full mb-2 w-40 bg-black text-white text-xs p-2 rounded shadow-xl z-50 text-center pointer-events-none">
                                                                  <strong className="block mb-1">{item.n}</strong><br/>{item.desc}
                                                              </div>
                                                          )}
                                                      </button>
                                                  );
                                              })}
                                          </div>
                                      </div>
                                  </div>
                              )}
                          </div>
                      )}
                  </div>
              </div>
              <ChatBox room={room} user={user} />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
