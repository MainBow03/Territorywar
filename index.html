                              const isTargetable = targetAction !== null && p.id !== user.uid;
                              const isEliminated = isGameEnded && idx >= winnersCount;
                              
                              return (
                                  <div 
                                      key={p.id} 
                                      onClick={() => isTargetable && applyTargetItem(p.id)}
                                      className={`flex items-center p-2 rounded-xl border-l-4 bg-slate-700/50 transition-all
                                          ${p.id === activePlayerId && !isGameEnded ? 'ring-1 ring-white/30' : ''}
                                          ${isTargetable ? 'cursor-pointer hover:bg-slate-600 ring-2 ring-red-500 animate-pulse' : ''}
                                          ${isEliminated ? 'opacity-40 grayscale' : ''}
                                      `}
                                      style={{borderColor: p.color}}
                                  >
                                      <div className="font-bold text-slate-500 w-4">{idx+1}</div>
                                      <img src={c?.i} className="w-10 h-10 rounded object-cover mx-2 border border-slate-600" />
                                      <div className="flex-1 min-w-0">
                                          <div className="font-bold text-sm truncate" style={{color: p.color}}>{p.n}</div>
                                          <div className="text-xs text-slate-300">{p.tiles} caselle</div>
                                      </div>
                                      <div className="flex gap-1 ml-1">
                                          {p.inventory?.map((itemId, i) => {
                                              const it = ITEMS.find(x => x.id === itemId);
                                              if(!it) return null;
                                              return (
                                                  <span key={i} className="text-sm bg-slate-800 rounded p-0.5" title={it.n}>
                                                      {it.icon}
                                                  </span>
                                              )
                                          })}
                                      </div>
                                  </div>
                              );
                          })}
                      </div>

                      {!isGameEnded && (
                          <div className="p-4 bg-slate-900 border-t border-slate-700">
                              <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Pannello Controllo</h4>
                              
                              {!isPlayingThisMatch ? (
                                  <div className="text-center py-4 text-slate-400 italic bg-slate-800 rounded-xl">
                                      Sei uno spettatore in questo turno.<br/>Goditi lo scontro!🍿
                                  </div>
                              ) : !isMyTurn ? (
                                  <div className="text-center py-4 text-slate-500 font-bold bg-slate-800 rounded-xl">In attesa di {activePlayer?.n}...</div>
                              ) : (
                                  <div className="space-y-3">
                                      {room.actionState === 'rolling' && (
                                          <button onClick={rollDice} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl shadow-[0_4px_14px_0_rgba(79,70,229,0.39)] transform hover:-translate-y-1 transition-all text-xl">
                                              🎲 LANCIA DADO
                                          </button>
                                      )}

                                      {room.actionState === 'moving' && (
                                          <div className="bg-slate-800 p-3 rounded-xl text-center border border-indigo-500/50">
                                              <div className="text-sm text-slate-400 mb-1">Mosse Rimanenti</div>
                                              <div className="text-4xl font-black text-indigo-400">{room.movesLeft}</div>
                                              <div className="text-xs text-slate-500 mt-1">Clicca sulle caselle adiacenti!</div>
                                          </div>
                                      )}

                                      {room.actionState === 'items_or_end' && (
                                          <button onClick={endTurnBtn} className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl shadow-lg transition-all">
                                              Termina Turno
                                          </button>
                                      )}

                                      <div className="mt-4">
                                          <div className="text-xs text-slate-400 mb-2 flex justify-between">
                                              <span>Inventario (Max 2)</span>
                                          </div>
                                          <div className="flex gap-2">
                                              {[0, 1].map(slot => {
                                                  const itemId = me?.inventory?.[slot];
                                                  const item = itemId ? ITEMS.find(i => i.id === itemId) : null;
                                                  return (
                                                      <button 
                                                          key={slot}
                                                          disabled={!item || (room.actionState === 'rolling' && item?.id === 'jackpot')} 
                                                          onClick={() => useItem(slot, itemId)}
                                                          className={`flex-1 h-14 rounded-lg flex items-center justify-center text-2xl border transition-all relative group
                                                              ${item ? 'bg-slate-700 border-slate-500 hover:border-white cursor-pointer hover:bg-slate-600' : 'bg-slate-800/50 border-slate-700 border-dashed cursor-not-allowed'}
                                                          `}
                                                      >
                                                          {item ? item.icon : ''}
                                                          {item && (
                                                              <div className="absolute bottom-full mb-2 hidden group-hover:block w-40 bg-black text-white text-xs p-2 rounded shadow-xl z-50 text-center pointer-events-none">
                                                                  <strong className="block mb-1">{item.n}</strong>
                                                                  {item.desc}
                                                              </div>
                                                          )}
                                                      </button>
                                                  );
                                              })}
                                          </div>
                                      </div>
                                  </div>
                              )}
                          </div>
                      )}
                  </div>
              </div>
            </div>
          );
        }

        // --- RENDER INIZIALE ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
